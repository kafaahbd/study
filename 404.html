<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA route redirect for GitHub Pages
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace("/index.html?p=" + path.replace(/\//g,'~and~'));
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
