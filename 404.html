    <!-- SPA Redirect Script (GitHub Pages) -->
    <script>
      (function() {
        // কাস্টম ডোমেইন বা রুটে থাকলে pathSegmentsToKeep = 0
        // সাবডিরেক্টরি (যেমন: username.github.io/repo/) হলে 1 সেট করুন
        var pathSegmentsToKeep = 0;

        var l = window.location;
        var repoPath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        
        // আসল পাথ, কুয়েরি ও হ্যাশ এনকোড করে সংরক্ষণ
        var originalPath = l.pathname.slice(1 + pathSegmentsToKeep) || '';
        var query = l.search || '';
        var hash = l.hash || '';

        // '/' চিহ্ন ও '&' কে বিকল্প স্ট্রিং দিয়ে প্রতিস্থাপন (পরে ডিকোড করবেন)
        var encodedPath = encodeURIComponent(
          originalPath.replace(/\//g, '~and~') + 
          (query ? '?' + query.slice(1).replace(/&/g, '~and~') : '') + 
          hash
        );

        // নতুন URL তৈরি: রুটে '?/' দিয়ে শুরু
        var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                     repoPath + '/' + encodedPath;

        // রিডাইরেক্ট
        l.replace(newUrl);
      })();
    </script>
